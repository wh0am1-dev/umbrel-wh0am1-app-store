version: '3.7'

services:
  app_proxy:
    environment:
      APP_HOST: whoami-satisfactory_web_1
      APP_PORT: 80

  web:
    image: wh0am1dev/umbrel-satisfactory:1.1.0@sha256:3438d1d167435392b8b77834f37f10931fe6e7eb344cc11aa0a4a53f87ca465a
    restart: on-failure
    user: 1000:1000

  server:
    image: indifferentbroccoli/satisfactory-server-docker:v1.1.5@sha256:243dfcd5d2c03be3bc5ac1a428b0ecad0c7d546b868005b69358a11e34f9ca8f
    restart: on-failure
    stop_grace_period: 30s
    ports:
      - 7777:7777/udp
      - 7777:7777/tcp
      - 7778:7778/tcp
    environment:
      PUID: 1000
      PGID: 1000
      GENERATE_SETTINGS: true
    env_file:
      - ${APP_DATA_DIR}/data/.env
    volumes:
      - ${APP_DATA_DIR}/data/server-files:/satisfactory
      - ${APP_DATA_DIR}/data/server-data:/home/steam/.config/Epic/FactoryGame/Saved/SaveGames
